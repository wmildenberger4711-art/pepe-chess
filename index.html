<!DOCTYPE html>
<html>
<head>
    <title>Pepe Capture Game</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
</head>

<body>

<div id="gameContainer">

    <h2>Pepe Capture</h2>

    <div id="tipPopup" class="tip-popup">
        Pieces can move twice. King must capture the last piece.
        <button id="closeTip" class="tip-close">×</button>
    </div>

    <p id="status"></p>

    <div id="board"></div>

    <div id="timer"></div>

    <!-- Controls -->
    <div id="controls">
        <button id="resetBtn">Reset</button>
        <button id="shareBtn" style="display:none;">Share</button>

        <label class="toggle-switch">
            <input type="checkbox" id="pieceToggle">
            <span class="slider"></span>
            <span class="toggle-text">Pepe</span>
        </label>
    </div>

</div>

<script src="boards.js"></script>
<script src="game.js"></script>

</body>
</html>
